<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Asistencia</title>
<link rel="stylesheet" href="styles.css">

<script src="script.js"></script>



</head>

<body>

<div class="header">
    Control de Asistencia Empresarial
</div>

<!-- LOGIN -->

<div class="container" id="login">

    <h3>Acceso Administrativo</h3>

    <input type="text" id="user" placeholder="Usuario">

    <input type="password" id="pass" placeholder="Contraseña">

    <button class="btn-primary" onclick="login()">
        Ingresar
    </button>

</div>

<!-- PANEL -->

<div class="container hidden" id="panel">

    <h3>Registro</h3>

    <select id="empleado"></select>

    <input type="text" id="nuevoEmpleado" placeholder="Nuevo empleado">

    <button class="btn-gray" onclick="agregarEmpleado()">
        Agregar
    </button>

    <button class="btn-success" onclick="entrada()">
        Entrada
    </button>

    <button class="btn-danger" onclick="salida()">
        Salida
    </button>

    <button class="btn-primary" onclick="verReportes()">
        Ver Reportes
    </button>

    <button class="btn-gray" onclick="logout()">
        Cerrar sesión
    </button>

</div>

<!-- REPORTES -->

<div class="container hidden" id="reportes">

    <h3>Reportes</h3>

    <select id="filtroEmpleado" onchange="verReportes()"></select>

    <div class="tabla-responsive">

    <table>

    <thead>
      <tr>
        <th>Empleado</th>
           <th>Fecha</th>
            <th>Entrada</th>
          <th>Salida</th>
         <th>Horas</th>
        <th>Acción</th>
        </tr>
   </thead>

        <tbody id="tabla"></tbody>

    </table>
    
</div>

    <h2 id="totalHoras"></h2>
    <button class="btn-success" onclick="exportarExcel()">
    Descargar Reporte
</button>

    <button class="btn-gray" onclick="volver()">
        Volver
    </button>

</div>


</body> 
<footer class="footer">
© Edgar Polanía Fandiño
</footer>

</html>
