<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Asistencia</title>

<style>

body { font-family: Arial; background: #f4f6f9; text-align: center; }

.container {width: 350px;margin: 40px auto;background: white;padding: 20px;border-radius: 10px;}

button {padding: 10px;margin: 5px;width: 100%;}

.hidden { display: none; }

table {width: 100%;border-collapse: collapse;}

td, th {border: 1px solid #ccc;padding: 5px;}

</style>

</head>

<body>

<div class="container" id="login">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuario"><br><br>
    <input type="password" id="pass" placeholder="Contraseña"><br><br>
    <button onclick="login()">Ingresar</button>

</div>

<div class="container hidden" id="asistencia">
    <h2>Registro de Asistencia</h2>

    <select id="empleado">
        <option>Alejandro Magno</option>
        <option>Maria Gonzales</option>
        <option>Eduardo Guevara</option>
    </select>

    <button onclick="entrada()">Registrar Entrada</button>
    <button onclick="salida()">Registrar Salida</button>

    <button onclick="irReportes()">Ver Reportes</button>

    <ul id="historial"></ul>
</div>

<div class="container hidden" id="reportes">
    <h2>Reportes</h2>

    <table>
        <thead>
            <tr>
                <th>Empleado</th>
                <th>Fecha</th>
                <th>Entrada</th>
                <th>Salida</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

    <button onclick="volver()">Volver</button>
</div>

<script>
let registros = [];
let actual = null;
let diaActual = new Date();
diaActual.setDate(diaActual.getDate() - 1);

function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u && p){
        document.getElementById("login").classList.add("hidden");
        document.getElementById("asistencia").classList.remove("hidden");} 
        else {alert("Ingrese datos");}}

function entrada(){
    let nombre = document.getElementById("empleado").value;

    if(actual && actual.salida === null){alert("Primero registra salida");return;}

    diaActual.setDate(diaActual.getDate() + 1);

    actual = {empleado: nombre,fecha: diaActual.toLocaleDateString(),
        entrada: new Date().toLocaleTimeString(),salida: null};

    registros.push(actual);
    mostrarHistorial();}

function salida(){
    if(!actual){
        alert("Primero registra entrada");
        return;}

    if(actual.salida){
        alert("Ya registraste salida");
        return;}

    actual.salida = new Date().toLocaleTimeString();
    mostrarHistorial();}

function mostrarHistorial(){let lista = document.getElementById("historial");lista.innerHTML = "";

    registros.forEach(r=>{let li = document.createElement("li");
        li.innerText = r.empleado + " | " + r.fecha + 
        " | E: " + r.entrada + " | S: " + (r.salida || "-");
        lista.appendChild(li);});}

function irReportes(){
    document.getElementById("asistencia").classList.add("hidden");
    document.getElementById("reportes").classList.remove("hidden");
    cargarTabla();}

function volver(){
    document.getElementById("reportes").classList.add("hidden");
    document.getElementById("asistencia").classList.remove("hidden");}

function cargarTabla(){
    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    registros.forEach(r=>{
        let fila = `
        <tr>
            <td>${r.empleado}</td>
            <td>${r.fecha}</td>
            <td>${r.entrada}</td>
            <td>${r.salida || "-"}</td>
        </tr>
        `;
        tabla.innerHTML += fila;});}
</script>

</body>
</html>
